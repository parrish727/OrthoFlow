# OrthoFlow AI — Local Development Stack
# Fully isolated from Melanin Tech infrastructure
# Mirrors production: swap minio→S3, ollama→Bedrock, postgres→RDS

networks:
  orthoflow:
    driver: bridge

volumes:
  of-pgdata:
  of-redis:
  of-minio:
  of-ollama:

services:
  # ── Data Layer ──────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orthoflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-orthoflow}
    volumes:
      - of-pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # 5433 to avoid conflict with melanin-tech postgres
    networks:
      - orthoflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthoflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - of-redis:/data
    ports:
      - "6380:6379"
    networks:
      - orthoflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Object Storage (S3-compatible) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-orthoflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-changeme123}
      # Server-side encryption (SSE-S3) — encrypts all objects at rest with AES-256
      MINIO_KMS_KES_ENDPOINT: ""
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    volumes:
      - of-minio:/data
    ports:
      - "9100:9000"   # API
      - "9101:9001"   # Console
    networks:
      - orthoflow
    restart: unless-stopped

  # ── Virus Scanning (ClamAV) ──────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    networks:
      - orthoflow
    restart: unless-stopped

  # ── AI / LLM (open-source, local) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - of-ollama:/root/.ollama
    ports:
      - "11435:11434"
    networks:
      - orthoflow
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull mistral && ollama pull nomic-embed-text && wait"]

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/parrish727/orthoflow/backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-orthoflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-orthoflow}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "8000:8000"
    networks:
      - orthoflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker (async invoice processing) ───────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/parrish727/orthoflow/backend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    command: ["python", "-m", "app.workers.main"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-orthoflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-orthoflow}
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./ml:/app/ml:ro
    networks:
      - orthoflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Auto-Deploy (Watchtower) ─────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_NOTIFICATION_URL=http://host.docker.internal:9090/webhook/deploy
      - WATCHTOWER_NOTIFICATION_TEMPLATE={{range .}}{"image":"{{.ImageName}}","container":"{{.ContainerName}}","source":"watchtower"}{{end}}
    networks:
      - orthoflow
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/parrish727/orthoflow/frontend:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "5173:3000"
    environment:
      - VITE_API_URL=https://api.orthoflowsolutions.com
    networks:
      - orthoflow
    depends_on:
      - backend
    restart: unless-stopped
